<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Exciting Expeditions</title>
    <meta name="description" content="Contact page for Exciting Expeditions. Send us your questions or suggestions!">
    <meta name="author" content="Felipe Zardo">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather&family=Roboto&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/rafting.css">
</head>
<body>
    <header>
        <img src="images/LOGO.jpg" alt="Rafting Site Logo">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1>Contact Us</h1>

        <section class="contact-info">
            <h2>Company Information</h2>
            <p>123 Rafting Road<br>River City, RC 12345</p>
            <p>Phone: (123) 456-7890</p>
            <p>Email: contact@excitingexpeditions.com</p>
            <iframe 
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3153.2948010247363!2d-122.4013610846812!3d37.79229317975681!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x80858064ec8ef3bb%3A0xcdf3f857a44f7ad5!2s123%20Rafting%20Rd%2C%20River%20City%2C%20RC!5e0!3m2!1sen!2sus!4v1712234567890" 
                width="100%" height="300" 
                allowfullscreen="" 
                loading="lazy" 
                referrerpolicy="no-referrer-when-downgrade">
            </iframe>
        </section>

        <section class="employee-profiles">
            <h2>Meet Our Team</h2>
            <figure>
                <img src="images/employee-1.jpg" alt="Smiling employee 1">
                <figcaption>John - Customer Support</figcaption>
            </figure>
            <figure>
                <img src="images/employee-2.jpg" alt="Smiling employee 2">
                <figcaption>Lisa - Reservations Expert</figcaption>
            </figure>
            <figure>
                <img src="images/employee-3.jpg" alt="Smiling employee 3">
                <figcaption>Mark - Web & IT Support</figcaption>
            </figure>
        </section>

        <section class="contact-form">
            <h2>Contact Us</h2>
            <form>
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
        
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
        
                <p>Purpose of Message:</p>
                <label><input type="radio" id="general" name="purpose" value="general"> General Inquiry</label>
                <label><input type="radio" id="reservation" name="purpose" value="reservation"> Reservation Question</label>
                <label><input type="radio" id="suggestion" name="purpose" value="suggestion"> Website Suggestion</label>
        
                <label for="message">Message:</label>
                <textarea id="message" name="message" rows="5" required></textarea>
        
                <label for="subscribe">
                    <input type="checkbox" id="subscribe" name="subscribe">
                    Please subscribe me to the monthly newsletter
                </label>
        
                <button type="submit">Send Message</button>
            </form>
        </section>
        
    </main>

    <footer>
        <p>©️ 2025 | Exciting Expeditions | Felipe</p>
        <nav class="social">
            <a href="http://facebook.com" target="_blank"><img src="images/facebook.svg" alt="Facebook"></a>
            <a href="https://twitter.com/" target="_blank"><img src="images/twitter.svg" alt="Twitter"></a>
            <a href="https://www.youtube.com/" target="_blank"><img src="images/youtube.svg" alt="Youtube"></a>
        </nav>
        <p><a href="link-do-seu-wireframe.png" target="_blank">View Contact Page Wireframe</a></p>
    </footer>
</body>
</html>
